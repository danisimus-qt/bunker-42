
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БУНКЕР 42</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

/*
  ПОЗИЦИЯ ПЛЕЕРА — вычислена по гифке
  Рамка A (красная) попала точно:
  left=44%, top=17%, width=30%, height=55%
  Немного расширяем:
*/
:root{
  --sl: 38.5%;
  --st: 29.5%;
  --sw: 24%;
  --sh: 31%;
  --a:#FF8C00;
  --a40:rgba(255,140,0,0.4);
  --glow:0 0 14px rgba(255,140,0,0.75),0 0 36px rgba(255,140,0,0.2);
  --mono:'Share Tech Mono',monospace;
  --title:'Orbitron',sans-serif;
}

body{background:#060402;color:var(--a);font-family:var(--mono);-webkit-font-smoothing:antialiased}

/* ── ФОН ── */
#bg-layer{position:fixed;inset:0;z-index:0}
.bg-slide{position:absolute;inset:0;background-size:100% 100%;background-position:center;opacity:0;transition:opacity 2.5s ease}
.bg-slide.active{opacity:1}
#bg-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(4,2,1,0.5) 0%,transparent 20%),
             linear-gradient(to top,rgba(4,2,1,0.4) 0%,transparent 12%);
}

#app{position:fixed;inset:0;z-index:10;pointer-events:none}

/* ── ВЕРХНЯЯ ПОЛОСА ── */
#topbar{
  position:absolute;top:0;left:0;right:0;
  padding:16px 24px 0;
  display:flex;align-items:flex-start;justify-content:space-between;
}
#clock-block{display:flex;flex-direction:column;gap:2px}
#clock-time{font-family:var(--mono);font-size:42px;color:var(--a);text-shadow:var(--glow);letter-spacing:2px;line-height:1}
#clock-date{font-family:var(--mono);font-size:16px;letter-spacing:3px;color:rgba(255,140,0,0.48)}
#station-block{text-align:right}
#station-name{font-family:var(--title);font-size:26px;font-weight:700;letter-spacing:4px;color:var(--a);text-shadow:var(--glow)}
#station-freq{font-family:var(--mono);font-size:16px;letter-spacing:3px;color:rgba(255,140,0,0.45);margin-top:4px}

/* ══════════════════════════════════════════
   ПЛЕЕР НА ЭКРАНЕ МОНИТОРА
   Лёгкое CRT-преломление
══════════════════════════════════════════ */
#player{
  position:absolute;
  left:var(--sl);top:var(--st);
  width:var(--sw);height:var(--sh);
  pointer-events:all;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-radius: 8px 8px 4px 4px;
  
}

/* ОБЛОЖКА с рамкой */
#cover-wrap{
  flex:1;position:relative;overflow:hidden;min-height:0;
  /* Рамка вокруг обложки */
  border:2px solid rgba(255,140,0,0.55);
  box-shadow:
    inset 0 0 20px rgba(0,0,0,0.6),
    0 0 0 1px rgba(255,140,0,0.2);
}
#cover-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:0;transition:opacity 0.8s ease;
  filter:brightness(0.78) saturate(0.65) contrast(1.1);
}
#cover-img.loaded{opacity:1}
#cover-placeholder{
  position:absolute;inset:0;background:#050302;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--title);font-size:9px;letter-spacing:5px;color:rgba(255,140,0,0.06);
}
/* CRT scanlines */
#cover-wrap::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 3px);
}
/* CRT vignette */
#cover-wrap::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse at 50% 45%,transparent 35%,rgba(0,0,0,0.75) 100%);
}

/* ══ НИЖНЯЯ ПАНЕЛЬ — по скетчу ══
   [статус + название + слайдер] [PLAY]
*/
#player-bar{
  background:rgba(3,2,1,0.95);
  border-top:2px solid rgba(255,140,0,0.4);
  flex-shrink:0;
  display:flex;
  align-items:stretch;
  height:64px;
}

/* Левая зона */
#bar-left{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding:8px 10px 8px 12px;
  gap:5px;
}

/* Статус-строка */
#status-row{display:flex;align-items:center;gap:6px}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all 0.4s}
.s-dot.off{background:rgba(255,140,0,0.2)}
.s-dot.on{background:var(--a);box-shadow:0 0 6px var(--a);animation:dp 2s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:0.2}}
#status-text{font-size:10px;letter-spacing:2.5px;color:rgba(255,140,0,0.7);text-transform:uppercase}

/* Название — по центру, прокрутка если длинное */
#track-wrap{overflow:hidden;white-space:nowrap;width:100%}
#track-title{
  display:inline-block;
  font-family:var(--mono);
  font-size:13px;
  letter-spacing:0.5px;
  color:rgba(255,140,0,0.95);
  white-space:nowrap;
  transition:opacity 0.35s;
}
#track-title.scroll{animation:marquee 14s linear infinite}
@keyframes marquee{
  0%,25%{transform:translateX(0)}
  75%,100%{transform:translateX(calc(-50% - 20px))}
}

/* Громкость */
#vol-row{display:flex;align-items:center;gap:7px}
.vol-lbl{font-size:9px;letter-spacing:1px;color:rgba(255,140,0,0.35);flex-shrink:0}
#vol-slider{
  width:80px;flex:none;
  -webkit-appearance:none;height:2px;
  background:rgba(255,140,0,0.2);border-radius:1px;outline:none;cursor:pointer;
}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--a);cursor:pointer}
#vol-slider::-moz-range-thumb{width:11px;height:11px;border-radius:50%;border:none;background:var(--a);cursor:pointer}
#vol-val{font-size:9px;color:rgba(255,140,0,0.35);width:20px;flex-shrink:0}

/* КНОПКА PLAY — квадратная, правая зона */
#play-btn{
  width:76px;height:64px;flex-shrink:0;
  border:none;border-left:2px solid rgba(255,140,0,0.4);
  background:rgba(255,140,0,0.06);
  color:var(--a);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;
}
#play-btn:hover{background:rgba(255,140,0,0.15)}
#play-btn:active{transform:scale(0.93)}
#play-btn svg{display:block}

/* ── НИЖНИЙ ТЕКСТ ── */
#footer-l{
  position:absolute;bottom:14px;left:24px;
  font-family:var(--mono);font-size:11px;letter-spacing:2.5px;
  color:rgba(255,140,0,0.5);text-transform:uppercase;font-style:italic;
}

/* ── QR поверх Kling ── */
#qr-img{
  position:absolute;bottom:0;right:0;
  width:90px;height:90px;
  filter:invert(1) sepia(1) saturate(5) hue-rotate(352deg) brightness(0.85) opacity(0.88);
  pointer-events:none;
  display:block;
}

/* ── МОБИЛЬНЫЙ ── */
@media(max-width:600px){
  #player{left:5%;top:auto;bottom:60px;width:90%;height:auto;transform:none}
  #cover-wrap{height:200px;flex:none}
  #clock-time{font-size:28px}#clock-date{font-size:13px}
  #station-name{font-size:18px}#station-freq{font-size:13px}
  #qr-img,#footer-l{display:none}
}

#yt-container{position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;overflow:hidden;pointer-events:none}
</style>
</head>
<body>
<div id="bg-layer"><div id="bg-overlay"></div></div>
<div id="app">

  <div id="topbar">
    <div id="clock-block">
      <div id="clock-time">00:00:00</div>
      <div id="clock-date">00.00.0000</div>
    </div>
    <div id="station-block">
      <div id="station-name">БУНКЕР 42</div>
      <div id="station-freq">105.3 FM</div>
    </div>
  </div>

  <div id="player">
    <div id="cover-wrap">
      <div id="cover-placeholder">BUNKER 42</div>
      <img id="cover-img" src="" alt="">
    </div>
    <div id="player-bar">
      <div id="bar-left">
        <div id="status-row">
          <div class="s-dot off" id="s-dot"></div>
          <span id="status-text">ИНИЦИАЛИЗАЦИЯ</span>
        </div>
        <div id="track-wrap">
          <span id="track-title">—</span>
        </div>
        <div id="vol-row">
          <span class="vol-lbl">VOL</span>
          <input type="range" id="vol-slider" min="0" max="100" value="70" step="1">
          <span id="vol-val">70</span>
        </div>
      </div>
      <button id="play-btn" aria-label="Play/Pause">
        <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
    </div>
  </div>

  <div id="footer-l">Лучшая музыка для уцелевших</div>
  <img id="qr-img" src="qr.png" alt="">
</div>

<div id="yt-container"><div id="yt-iframe"></div></div>
<script src="config.js"></script>
<script>
const RADIO_EPOCH=1700000000;
let ytPlayer=null,allTracks=[],queue=[],queuePos=0,initialSeek=0;
let voiceIdx=0,trackCount=0,isMuted=true,hasStarted=false,currentVol=CONFIG.player.defaultVolume;
let voiceAudio=null,isVoice=false,bgIdx=0,bgSlides=[],ytAPIReady=false,tracksReady=false;

function updateClock(){
  const msk=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
  const hh=String(msk.getHours()).padStart(2,'0'),mm=String(msk.getMinutes()).padStart(2,'0'),ss=String(msk.getSeconds()).padStart(2,'0');
  const dd=String(msk.getDate()).padStart(2,'0'),mo=String(msk.getMonth()+1).padStart(2,'0'),yr=msk.getFullYear()+71;
  document.getElementById('clock-time').textContent=`${hh}:${mm}:${ss}`;
  document.getElementById('clock-date').textContent=`${dd}.${mo}.${yr}`;
}
setInterval(updateClock,1000);updateClock();

document.getElementById('station-name').textContent=CONFIG.station.name;
document.getElementById('station-freq').textContent=CONFIG.station.frequency;
document.title=CONFIG.station.name;
document.getElementById('vol-slider').value=CONFIG.player.defaultVolume;
document.getElementById('vol-val').textContent=CONFIG.player.defaultVolume;
currentVol=CONFIG.player.defaultVolume;

function initBackgrounds(){
  const layer=document.getElementById('bg-layer'),overlay=document.getElementById('bg-overlay');
  CONFIG.backgrounds.sources.forEach((src,i)=>{
    const el=document.createElement('div');
    el.className='bg-slide'+(i===0?' active':'');
    el.style.backgroundImage=`url(${src})`;
    layer.insertBefore(el,overlay);bgSlides.push(el);
  });
  if(bgSlides.length>1)setInterval(()=>{
    bgSlides[bgIdx].classList.remove('active');
    bgIdx=(bgIdx+1)%bgSlides.length;
    bgSlides[bgIdx].classList.add('active');
  },CONFIG.backgrounds.interval*1000);
}

function seededRand(seed){let s=seed>>>0;return()=>{s=Math.imul(1664525,s)+1013904223>>>0;return s/4294967296};}
function deterministicShuffle(arr){
  const a=[...arr],rnd=seededRand(42);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildQueue(){queue=CONFIG.player.shuffle?deterministicShuffle(allTracks.map((_,i)=>i)):allTracks.map((_,i)=>i);}

function parseDuration(iso){
  if(!iso)return 240;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  return(parseInt(m&&m[1]||0)*3600)+(parseInt(m&&m[2]||0)*60)+parseInt(m&&m[3]||0);
}

async function fetchDurations(ids){
  const{apiKey}=CONFIG.youtube,d={};
  for(let i=0;i<ids.length;i+=50){
    const batch=ids.slice(i,i+50).join(',');
    try{
      const r=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch}&key=${apiKey}`);
      const data=await r.json();
      (data.items||[]).forEach(it=>{d[it.id]=parseDuration(it.contentDetails?.duration);});
    }catch(e){}
  }
  return d;
}

function getCurrentPosition(){
  const now=Math.floor(Date.now()/1000),elapsed=now-RADIO_EPOCH;
  const total=allTracks.reduce((s,t)=>s+t.duration,0);
  if(!total)return{trackIdx:0,seekTo:0};
  const pos=elapsed%total;let acc=0;
  for(let i=0;i<queue.length;i++){
    const dur=allTracks[queue[i]].duration;
    if(pos<acc+dur)return{trackIdx:i,seekTo:pos-acc};
    acc+=dur;
  }
  return{trackIdx:0,seekTo:0};
}

async function fetchPlaylist(pt){
  const{apiKey,playlistId}=CONFIG.youtube;
  if(!apiKey||apiKey.includes('ВСТАВЬ')){setStatus('УКАЖИ API КЛЮЧ');return[];}
  if(!playlistId||playlistId.includes('ВСТАВЬ')){setStatus('УКАЖИ ID ПЛЕЙЛИСТА');return[];}
  let url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${apiKey}`;
  if(pt)url+=`&pageToken=${pt}`;
  let data;
  try{const r=await fetch(url);data=await r.json();}catch(e){setStatus('ОШИБКА СЕТИ');return[];}
  if(data.error){setStatus(data.error.message.slice(0,38).toUpperCase());return[];}
  const items=(data.items||[]).filter(it=>it.snippet.title!=='Private video'&&it.snippet.title!=='Deleted video')
    .map(it=>({
      id:it.snippet.resourceId.videoId,title:it.snippet.title,
      thumb:it.snippet.thumbnails?.maxres?.url||it.snippet.thumbnails?.high?.url
        ||`https://img.youtube.com/vi/${it.snippet.resourceId.videoId}/maxresdefault.jpg`,
      duration:240,
    }));
  if(data.nextPageToken){const more=await fetchPlaylist(data.nextPageToken);return[...items,...more];}
  return items;
}

function loadTrackUI(track){
  const te=document.getElementById('track-title');
  const wrap=document.getElementById('track-wrap');
  te.style.opacity=0;te.classList.remove('scroll');
  setTimeout(()=>{
    te.textContent=track.title;
    te.style.transition='opacity 0.5s';te.style.opacity=1;
    requestAnimationFrame(()=>{
      if(te.scrollWidth>wrap.clientWidth+2){
        te.textContent=track.title+'   —   '+track.title;
        te.classList.add('scroll');
      }
    });
  },350);
  const img=document.getElementById('cover-img');
  img.classList.remove('loaded');
  img.onload=()=>img.classList.add('loaded');
  img.onerror=()=>{img.src=`https://img.youtube.com/vi/${track.id}/hqdefault.jpg`;};
  img.src=track.thumb;
}
function setStatus(t){document.getElementById('status-text').textContent=t;}

function playTrack(idx,seek){
  if(!ytPlayer||!allTracks.length)return;
  const track=allTracks[queue[idx]];loadTrackUI(track);
  if(seek&&seek>1)ytPlayer.loadVideoById({videoId:track.id,startSeconds:Math.floor(seek)});
  else ytPlayer.loadVideoById(track.id);
}
function advanceTrack(){
  if(!isVoice&&CONFIG.voices.enabled&&CONFIG.voices.files.length){
    trackCount++;
    if(trackCount>=CONFIG.voices.interval){trackCount=0;playVoiceMessage();return;}
  }
  queuePos++;if(queuePos>=queue.length){buildQueue();queuePos=0;}
  playTrack(queuePos,0);
}
function playVoiceMessage(){
  const files=CONFIG.voices.files;if(!files.length){advanceTrack();return;}
  const file=files[voiceIdx%files.length];voiceIdx++;
  isVoice=true;setStatus('СООБЩЕНИЕ ВЕДУЩЕГО');
  if(ytPlayer)ytPlayer.pauseVideo();
  voiceAudio=new Audio(`media/voices/${file}`);
  voiceAudio.volume=isMuted?0:currentVol/100;
  voiceAudio.play().catch(finishVoice);voiceAudio.onended=finishVoice;
}
function finishVoice(){
  isVoice=false;voiceAudio=null;setStatus('В ЭФИРЕ');
  queuePos++;if(queuePos>=queue.length){buildQueue();queuePos=0;}
  playTrack(queuePos,0);
}
function applyVolume(){
  const vol=isMuted?0:currentVol;
  if(ytPlayer&&typeof ytPlayer.setVolume==='function')ytPlayer.setVolume(isVoice?0:vol);
  if(voiceAudio)voiceAudio.volume=vol/100;
}
function setPlayIcon(show){
  document.getElementById('icon-play').style.display=show?'block':'none';
  document.getElementById('icon-pause').style.display=show?'none':'block';
}
function togglePlay(){
  if(!hasStarted){
    hasStarted=true;isMuted=false;
    if(allTracks.length){
      const{trackIdx,seekTo}=getCurrentPosition();
      const state=ytPlayer?ytPlayer.getPlayerState():-1;
      if(state!==1&&state!==3){
        queuePos=trackIdx;loadTrackUI(allTracks[queue[queuePos]]);
        if(ytPlayer)ytPlayer.loadVideoById({videoId:allTracks[queue[queuePos]].id,startSeconds:Math.floor(seekTo)});
      }
    }
    applyVolume();if(ytPlayer)ytPlayer.playVideo();
    setPlayIcon(false);
    document.getElementById('s-dot').className='s-dot on';
    setStatus('В ЭФИРЕ');return;
  }
  isMuted=!isMuted;applyVolume();setPlayIcon(isMuted);
}
function loadYouTubeAPI(){const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);}
window.onYouTubeIframeAPIReady=function(){ytAPIReady=true;tryInitPlayer();};
function tryInitPlayer(){
  if(!ytAPIReady||!tracksReady)return;
  const track=allTracks[queue[queuePos]];
  ytPlayer=new YT.Player('yt-iframe',{
    height:'1',width:'1',videoId:track.id,
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0,start:Math.floor(initialSeek),origin:window.location.origin||'*'},
    events:{onReady:onYTReady,onStateChange:onYTState}
  });
}
function onYTReady(){
  ytPlayer.setVolume(0);
  if(initialSeek>1)ytPlayer.seekTo(Math.floor(initialSeek),true);
  ytPlayer.playVideo();setStatus('НАЖМИ PLAY');
}
function onYTState(e){
  if(e.data===YT.PlayerState.ENDED&&!isVoice)advanceTrack();
  if(e.data===YT.PlayerState.PLAYING&&!isMuted&&hasStarted&&!isVoice)ytPlayer.setVolume(currentVol);
}
document.getElementById('play-btn').addEventListener('click',togglePlay);
document.getElementById('vol-slider').addEventListener('input',function(){
  currentVol=parseInt(this.value);
  document.getElementById('vol-val').textContent=currentVol;
  if(!isMuted)applyVolume();
});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target===document.body){e.preventDefault();togglePlay();}});

async function boot(){
  initBackgrounds();loadYouTubeAPI();
  setStatus('ЗАГРУЗКА...');
  const items=await fetchPlaylist();if(!items.length)return;
  setStatus('СИНХРОНИЗАЦИЯ...');
  const durations=await fetchDurations(items.map(t=>t.id));
  allTracks=items.map(t=>({...t,duration:durations[t.id]||240}));
  buildQueue();
  const{trackIdx,seekTo}=getCurrentPosition();
  queuePos=trackIdx;initialSeek=seekTo;
  if(CONFIG.voices.files.length){
    trackCount=queuePos%Math.max(1,CONFIG.voices.interval);
    voiceIdx=Math.floor(queuePos/Math.max(1,CONFIG.voices.interval))%Math.max(1,CONFIG.voices.files.length);
  }
  loadTrackUI(allTracks[queue[queuePos]]);
  tracksReady=true;tryInitPlayer();
}
boot();
</script>


</body>
</html>
