
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БУНКЕР 42</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --g:#4cff91;--g40:rgba(76,255,145,0.4);--g15:rgba(76,255,145,0.15);
  --g08:rgba(76,255,145,0.08);
  --glow:0 0 10px rgba(76,255,145,0.55),0 0 28px rgba(76,255,145,0.2);
  --glow-sm:0 0 6px rgba(76,255,145,0.4);
  --bg:#060806;--card:rgba(3,7,3,0.92);
  --mono:'Share Tech Mono',monospace;--title:'Orbitron',sans-serif;
}
body{background:var(--bg);color:var(--g);font-family:var(--mono);-webkit-font-smoothing:antialiased}
#scanlines{position:fixed;inset:0;z-index:998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(0,0,0,0.09) 3px,rgba(0,0,0,0.09) 4px)}
#bg-layer{position:fixed;inset:0;z-index:0}
.bg-slide{position:absolute;inset:0;background-size:100% 100%;background-position:center;
  opacity:0;transition:opacity 2.5s ease;animation:bg-zoom 28s ease-in-out infinite alternate}
.bg-slide.active{opacity:1}
@keyframes bg-zoom{from{transform:scale(1.0)}to{transform:scale(1.07)}}
#bg-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,
  rgba(6,8,6,0.72) 0%,rgba(6,8,6,0.38) 45%,rgba(6,8,6,0.82) 100%)}
#bg-tint{position:absolute;inset:0;background:rgba(8,22,12,0.28)}
#app{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column}
header{flex-shrink:0;padding:22px 30px;display:flex;align-items:flex-start;justify-content:space-between}
#clock{font-family:var(--mono);line-height:1.5}
#clock-time{font-size:24px;color:var(--g);text-shadow:var(--glow);letter-spacing:3px}
#clock-date{font-size:11px;letter-spacing:3px;color:rgba(76,255,145,0.42)}
#station-id{text-align:right}
#station-name{font-family:var(--title);font-size:15px;font-weight:700;letter-spacing:5px;color:var(--g);text-shadow:var(--glow)}
#station-freq{font-size:11px;letter-spacing:3px;color:rgba(76,255,145,0.38);margin-top:4px}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:16px 20px}
.card{width:min(318px,92vw);background:var(--card);border:1px solid var(--g40);border-radius:2px;
  padding:18px 18px 22px;
  box-shadow:0 0 80px rgba(0,0,0,0.95),inset 0 0 60px rgba(76,255,145,0.025),0 0 0 1px rgba(76,255,145,0.07);
  position:relative}
.card::before,.card::after{content:'';position:absolute;width:14px;height:14px;
  border-color:var(--g);border-style:solid;opacity:0.55}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.card-status{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:3px;
  color:rgba(76,255,145,0.38);margin-bottom:14px;text-transform:uppercase}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all 0.4s}
.s-dot.off{background:rgba(76,255,145,0.2);box-shadow:none}
.s-dot.on{background:var(--g);box-shadow:0 0 8px var(--g),0 0 16px rgba(76,255,145,0.4);
  animation:dot-pulse 2.2s ease-in-out infinite}
@keyframes dot-pulse{0%,100%{opacity:1}50%{opacity:0.35}}
#cover-wrap{position:relative;width:100%;padding-bottom:100%;background:#080e08;
  border:1px solid rgba(76,255,145,0.12);overflow:hidden;margin-bottom:15px}
#cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity 0.9s ease;filter:brightness(0.88) saturate(0.8)}
#cover-img.loaded{opacity:1}
#cover-wrap::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(76,255,145,0.045) 3px,rgba(76,255,145,0.045) 4px)}
#cover-wrap::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:rgba(10,40,20,0.18)}
#cover-placeholder{position:absolute;inset:0;z-index:0;display:flex;align-items:center;
  justify-content:center;font-family:var(--title);font-size:10px;letter-spacing:4px;color:rgba(76,255,145,0.08)}
#track-title{font-family:var(--mono);font-size:13px;letter-spacing:1px;color:var(--g);
  text-shadow:var(--glow-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  height:20px;transition:opacity 0.35s}
#track-artist{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(76,255,145,0.38);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:6px;height:15px;transition:opacity 0.35s}
.controls{display:flex;justify-content:center;margin-top:22px}
#play-btn{width:60px;height:60px;border-radius:50%;border:1px solid var(--g40);
  background:var(--g08);color:var(--g);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all 0.2s ease;box-shadow:0 0 18px rgba(76,255,145,0.1);
  -webkit-tap-highlight-color:transparent}
#play-btn:hover{background:rgba(76,255,145,0.13);border-color:var(--g);
  box-shadow:0 0 30px rgba(76,255,145,0.28),inset 0 0 20px rgba(76,255,145,0.06);transform:scale(1.05)}
#play-btn:active{transform:scale(0.94)}
#vol-wrap{display:flex;align-items:center;gap:10px;margin-top:20px}
.vol-label{font-size:10px;letter-spacing:2px;color:rgba(76,255,145,0.28);width:32px;text-align:right}
#vol-slider{flex:1;-webkit-appearance:none;height:2px;background:rgba(76,255,145,0.18);
  border-radius:1px;outline:none;cursor:pointer}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--g);box-shadow:0 0 8px rgba(76,255,145,0.7);cursor:pointer;transition:transform 0.15s}
#vol-slider::-webkit-slider-thumb:hover{transform:scale(1.35)}
#vol-slider::-moz-range-thumb{width:13px;height:13px;border-radius:50%;border:none;
  background:var(--g);box-shadow:0 0 8px rgba(76,255,145,0.7);cursor:pointer}
#vol-val{font-size:10px;color:rgba(76,255,145,0.28);letter-spacing:1px;width:28px}
footer{flex-shrink:0;padding:0 30px 22px;display:flex;justify-content:space-between;align-items:flex-end}
.footer-text{font-size:10px;letter-spacing:2px;color:rgba(76,255,145,0.15);text-transform:uppercase}
@media(max-width:480px){
  header{padding:16px 18px}footer{padding:0 18px 16px}
  #clock-time{font-size:19px}#station-name{font-size:12px;letter-spacing:4px}
  .card{padding:14px 14px 18px}#vol-wrap{display:none}
}
#yt-container{position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;overflow:hidden;pointer-events:none}
</style>
</head>
<body>
<div id="scanlines"></div>
<div id="bg-layer"><div id="bg-overlay"></div><div id="bg-tint"></div></div>
<div id="app">
  <header>
    <div id="clock">
      <div id="clock-time">00:00:00</div>
      <div id="clock-date">00.00.0000</div>
    </div>
    <div id="station-id">
      <div id="station-name">БУНКЕР 42</div>
      <div id="station-freq">42.0 FM</div>
    </div>
  </header>
  <main>
    <div class="card">
      <div class="card-status">
        <div class="s-dot off" id="s-dot"></div>
        <span id="status-text">ИНИЦИАЛИЗАЦИЯ</span>
      </div>
      <div id="cover-wrap">
        <div id="cover-placeholder">BUNKER 42</div>
        <img id="cover-img" src="" alt="">
      </div>
      <div id="track-title">—</div>
      <div id="track-artist">загрузка</div>
      <div class="controls">
        <button id="play-btn" aria-label="Play / Pause">
          <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
      </div>
      <div id="vol-wrap">
        <span class="vol-label">VOL</span>
        <input type="range" id="vol-slider" min="0" max="100" value="70">
        <span id="vol-val">70</span>
      </div>
    </div>
  </main>
  <footer>
    <span class="footer-text" id="footer-l">МОСКВА / 2097</span>
    <span class="footer-text">ТРАНСЛЯЦИЯ ПРОДОЛЖАЕТСЯ</span>
  </footer>
</div>
<div id="yt-container"><div id="yt-iframe"></div></div>
<script src="config.js"></script>
<script>
const RADIO_EPOCH=1700000000;
let ytPlayer=null,allTracks=[],queue=[],queuePos=0,initialSeek=0;
let voiceIdx=0,trackCount=0,isMuted=true,hasStarted=false,currentVol=CONFIG.player.defaultVolume;
let voiceAudio=null,isVoice=false,bgIdx=0,bgSlides=[],ytAPIReady=false,tracksReady=false;

function updateClock(){
  const msk=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
  const hh=String(msk.getHours()).padStart(2,'0'),mm=String(msk.getMinutes()).padStart(2,'0'),ss=String(msk.getSeconds()).padStart(2,'0');
  const dd=String(msk.getDate()).padStart(2,'0'),mo=String(msk.getMonth()+1).padStart(2,'0'),yr=msk.getFullYear()+71;
  document.getElementById('clock-time').textContent=`${hh}:${mm}:${ss}`;
  document.getElementById('clock-date').textContent=`${dd}.${mo}.${yr}`;
  document.getElementById('footer-l').textContent=`МОСКВА / ${yr}`;
}
setInterval(updateClock,1000);updateClock();

document.getElementById('station-name').textContent=CONFIG.station.name;
document.getElementById('station-freq').textContent=CONFIG.station.frequency;
document.title=CONFIG.station.name;
document.getElementById('vol-slider').value=CONFIG.player.defaultVolume;
document.getElementById('vol-val').textContent=CONFIG.player.defaultVolume;
currentVol=CONFIG.player.defaultVolume;

function initBackgrounds(){
  const layer=document.getElementById('bg-layer'),overlay=document.getElementById('bg-overlay');
  CONFIG.backgrounds.sources.forEach((src,i)=>{
    const el=document.createElement('div');
    el.className='bg-slide'+(i===0?' active':'');
    el.style.backgroundImage=`url(${src})`;
    layer.insertBefore(el,overlay);bgSlides.push(el);
  });
  if(bgSlides.length>1)setInterval(()=>{
    bgSlides[bgIdx].classList.remove('active');
    bgIdx=(bgIdx+1)%bgSlides.length;
    bgSlides[bgIdx].classList.add('active');
  },CONFIG.backgrounds.interval*1000);
}

function seededRand(seed){
  let s=seed>>>0;
  return()=>{s=Math.imul(1664525,s)+1013904223>>>0;return s/4294967296};
}
function deterministicShuffle(arr){
  const a=[...arr],rnd=seededRand(42);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildQueue(){
  const idx=allTracks.map((_,i)=>i);
  queue=CONFIG.player.shuffle?deterministicShuffle(idx):idx;
}

function parseDuration(iso){
  if(!iso)return 240;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 240;
  return(parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}

async function fetchDurations(videoIds){
  const{apiKey}=CONFIG.youtube,durations={};
  for(let i=0;i<videoIds.length;i+=50){
    const batch=videoIds.slice(i,i+50).join(',');
    try{
      const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch}&key=${apiKey}`);
      const data=await res.json();
      (data.items||[]).forEach(item=>{durations[item.id]=parseDuration(item.contentDetails?.duration);});
    }catch(e){}
  }
  return durations;
}

function getCurrentPosition(){
  const now=Math.floor(Date.now()/1000),elapsed=now-RADIO_EPOCH;
  const totalDur=allTracks.reduce((s,t)=>s+t.duration,0);
  if(!totalDur)return{trackIdx:0,seekTo:0};
  const posInCycle=elapsed%totalDur;
  let acc=0;
  for(let i=0;i<queue.length;i++){
    const dur=allTracks[queue[i]].duration;
    if(posInCycle<acc+dur)return{trackIdx:i,seekTo:posInCycle-acc};
    acc+=dur;
  }
  return{trackIdx:0,seekTo:0};
}

async function fetchPlaylist(pageToken){
  const{apiKey,playlistId}=CONFIG.youtube;
  if(!apiKey||apiKey.includes('ВСТАВЬ')){setStatus('УКАЖИ API КЛЮЧ В CONFIG.JS');return[];}
  if(!playlistId||playlistId.includes('ВСТАВЬ')){setStatus('УКАЖИ ID ПЛЕЙЛИСТА В CONFIG.JS');return[];}
  let url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${apiKey}`;
  if(pageToken)url+=`&pageToken=${pageToken}`;
  let data;
  try{const res=await fetch(url);data=await res.json();}catch(e){setStatus('ОШИБКА СЕТИ');return[];}
  if(data.error){setStatus(data.error.message.toUpperCase().slice(0,40));return[];}
  const items=(data.items||[])
    .filter(it=>it.snippet.title!=='Private video'&&it.snippet.title!=='Deleted video')
    .map(it=>({
      id:it.snippet.resourceId.videoId,title:it.snippet.title,
      thumb:it.snippet.thumbnails?.maxres?.url||it.snippet.thumbnails?.high?.url
        ||`https://img.youtube.com/vi/${it.snippet.resourceId.videoId}/maxresdefault.jpg`,
      duration:240,
    }));
  if(data.nextPageToken){const more=await fetchPlaylist(data.nextPageToken);return[...items,...more];}
  return items;
}

function loadTrackUI(track){
  const te=document.getElementById('track-title'),ae=document.getElementById('track-artist');
  te.style.opacity=0;ae.style.opacity=0;
  setTimeout(()=>{
    te.textContent=track.title;ae.textContent='▶ ТРАНСЛЯЦИЯ';
    te.style.transition='opacity 0.5s';ae.style.transition='opacity 0.5s';
    te.style.opacity=1;ae.style.opacity=1;
  },350);
  const img=document.getElementById('cover-img');
  img.classList.remove('loaded');
  img.onload=()=>img.classList.add('loaded');
  img.onerror=()=>{img.src=`https://img.youtube.com/vi/${track.id}/hqdefault.jpg`;};
  img.src=track.thumb;
}
function setStatus(text){document.getElementById('status-text').textContent=text;}

function playTrack(idx,seek){
  if(!ytPlayer||!allTracks.length)return;
  const track=allTracks[queue[idx]];
  loadTrackUI(track);
  if(seek&&seek>0)ytPlayer.loadVideoById({videoId:track.id,startSeconds:seek});
  else ytPlayer.loadVideoById(track.id);
}

function advanceTrack(){
  if(!isVoice&&CONFIG.voices.enabled&&CONFIG.voices.files.length){
    trackCount++;
    if(trackCount>=CONFIG.voices.interval){trackCount=0;playVoiceMessage();return;}
  }
  queuePos++;
  if(queuePos>=queue.length){buildQueue();queuePos=0;}
  playTrack(queuePos,0);
}

function playVoiceMessage(){
  const files=CONFIG.voices.files;
  if(!files.length){advanceTrack();return;}
  const file=files[voiceIdx%files.length];voiceIdx++;
  isVoice=true;setStatus('СООБЩЕНИЕ ВЕДУЩЕГО');
  if(ytPlayer)ytPlayer.pauseVideo();
  voiceAudio=new Audio(`media/voices/${file}`);
  voiceAudio.volume=isMuted?0:currentVol/100;
  voiceAudio.play().catch(finishVoice);
  voiceAudio.onended=finishVoice;
}
function finishVoice(){
  isVoice=false;voiceAudio=null;setStatus('В ЭФИРЕ');
  queuePos++;if(queuePos>=queue.length){buildQueue();queuePos=0;}
  playTrack(queuePos,0);
}

function applyVolume(){
  const vol=isMuted?0:currentVol;
  if(ytPlayer&&typeof ytPlayer.setVolume==='function')ytPlayer.setVolume(isVoice?0:vol);
  if(voiceAudio)voiceAudio.volume=vol/100;
}
function setPlayIcon(showPlay){
  document.getElementById('icon-play').style.display=showPlay?'block':'none';
  document.getElementById('icon-pause').style.display=showPlay?'none':'block';
}
function togglePlay(){
  if(!hasStarted){
    hasStarted=true;isMuted=false;applyVolume();
    if(ytPlayer)ytPlayer.playVideo();
    setPlayIcon(false);
    document.getElementById('s-dot').className='s-dot on';
    setStatus('В ЭФИРЕ');return;
  }
  isMuted=!isMuted;applyVolume();setPlayIcon(isMuted);
}

function loadYouTubeAPI(){
  const s=document.createElement('script');
  s.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}
window.onYouTubeIframeAPIReady=function(){ytAPIReady=true;tryInitPlayer();};
function tryInitPlayer(){
  if(!ytAPIReady||!tracksReady)return;
  const track=allTracks[queue[queuePos]];
  ytPlayer=new YT.Player('yt-iframe',{
    height:'1',width:'1',videoId:track.id,
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,
      modestbranding:1,rel:0,start:Math.floor(initialSeek),origin:window.location.origin||'*'},
    events:{onReady:onYTReady,onStateChange:onYTState}
  });
}
function onYTReady(){
  ytPlayer.setVolume(0);
  if(initialSeek>0)ytPlayer.seekTo(initialSeek,true);
  ytPlayer.playVideo();
  setStatus('НАЖМИ PLAY ДЛЯ ЗАПУСКА');
}
function onYTState(e){
  if(e.data===YT.PlayerState.ENDED&&!isVoice)advanceTrack();
  if(e.data===YT.PlayerState.PLAYING&&!isMuted&&hasStarted&&!isVoice)ytPlayer.setVolume(currentVol);
}

document.getElementById('play-btn').addEventListener('click',togglePlay);
document.getElementById('vol-slider').addEventListener('input',function(){
  currentVol=parseInt(this.value);
  document.getElementById('vol-val').textContent=currentVol;
  if(!isMuted)applyVolume();
});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target===document.body){e.preventDefault();togglePlay();}
});

async function boot(){
  initBackgrounds();loadYouTubeAPI();
  setStatus('ЗАГРУЗКА ПЛЕЙЛИСТА...');
  const items=await fetchPlaylist();
  if(!items.length)return;
  setStatus('СИНХРОНИЗАЦИЯ...');
  const durations=await fetchDurations(items.map(t=>t.id));
  allTracks=items.map(t=>({...t,duration:durations[t.id]||240}));
  buildQueue();
  const{trackIdx,seekTo}=getCurrentPosition();
  queuePos=trackIdx;initialSeek=seekTo;
  if(CONFIG.voices.files.length){
    trackCount=queuePos%CONFIG.voices.interval;
    voiceIdx=Math.floor(queuePos/CONFIG.voices.interval)%Math.max(1,CONFIG.voices.files.length);
  }
  loadTrackUI(allTracks[queue[queuePos]]);
  tracksReady=true;tryInitPlayer();
}
boot();
</script>
</body>
</html>
