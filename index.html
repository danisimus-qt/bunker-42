
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БУНКЕР 42</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

/*
  ╔═══════════════════════════════════════════╗
  ║  НАСТРОЙКА ПОЗИЦИИ ПЛЕЕРА НА ЭКРАНЕ       ║
  ║  Если плеер съехал — меняй только эти     ║
  ║  четыре переменные                        ║
  ╚═══════════════════════════════════════════╝
*/
:root{
  --screen-left:   35%;   /* левый край экрана монитора  */
  --screen-top:    23%;   /* верхний край экрана         */
  --screen-width:  30%;   /* ширина экрана               */
  --screen-height: 56%;   /* высота экрана               */

  /* CRT перспектива — небольшой наклон */
  --crt-tilt: perspective(800px) rotateX(2deg) rotateY(-1deg);

  /* Цвет интерфейса */
  --a:#FF8C00;
  --a40:rgba(255,140,0,0.4);
  --a08:rgba(255,140,0,0.08);
  --glow:0 0 12px rgba(255,140,0,0.7),0 0 32px rgba(255,140,0,0.2);
  --mono:'Share Tech Mono',monospace;
  --title:'Orbitron',sans-serif;
}

body{background:#060402;color:var(--a);font-family:var(--mono);-webkit-font-smoothing:antialiased}

/* ── ФОН ── */
#bg-layer{position:fixed;inset:0;z-index:0}
.bg-slide{position:absolute;inset:0;background-size:100% 100%;background-position:center;opacity:0;transition:opacity 2.5s ease}
.bg-slide.active{opacity:1}
#bg-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(6,4,2,0.25) 0%,rgba(6,4,2,0.0) 35%,rgba(6,4,2,0.35) 100%)}

/* ── ОСНОВНОЙ СЛОЙ ── */
#app{position:fixed;inset:0;z-index:10;pointer-events:none}

/* ── ЧАСЫ СЛЕВА СВЕРХУ ── */
#clock{position:absolute;top:22px;left:26px;font-family:var(--mono);line-height:1.3;pointer-events:none}
#clock-time{font-size:62px;color:var(--a);text-shadow:var(--glow);letter-spacing:2px;line-height:1}
#clock-date{font-size:28px;letter-spacing:3px;color:rgba(255,140,0,0.5);margin-top:4px}

/* ── СТАНЦИЯ СПРАВА СВЕРХУ ── */
#station-id{position:absolute;top:22px;right:26px;text-align:right;pointer-events:none}
#station-name{font-family:var(--title);font-size:34px;font-weight:700;letter-spacing:5px;color:var(--a);text-shadow:var(--glow)}
#station-freq{font-size:26px;letter-spacing:3px;color:rgba(255,140,0,0.45);margin-top:6px}

/* ── ПЛЕЕР НА ЭКРАНЕ МОНИТОРА ── */
#player-screen{
  position:absolute;
  left:var(--screen-left);
  top:var(--screen-top);
  width:var(--screen-width);
  height:var(--screen-height);
  transform:var(--crt-tilt);
  pointer-events:all;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Обложка — занимает большую часть экрана */
#cover-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}
#cover-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 0.9s ease;
  filter:brightness(0.82) saturate(0.7) contrast(1.05);
}
#cover-img.loaded{opacity:1}
#cover-placeholder{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--title);font-size:10px;letter-spacing:4px;
  color:rgba(255,140,0,0.06);
}
/* CRT scanlines на обложке */
#cover-wrap::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,0.14) 2px,rgba(0,0,0,0.14) 3px);
}
/* CRT vignette */
#cover-wrap::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.55) 100%);
}

/* Нижняя панель плеера */
#player-bar{
  background:rgba(4,3,1,0.88);
  padding:6px 10px 8px;
  display:flex;
  flex-direction:column;
  gap:5px;
  border-top:1px solid rgba(255,140,0,0.12);
  flex-shrink:0;
}
#track-info-row{display:flex;align-items:center;gap:6px}
.s-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;transition:all 0.4s}
.s-dot.off{background:rgba(255,140,0,0.2)}
.s-dot.on{background:var(--a);box-shadow:0 0 5px var(--a);animation:dot-p 2s ease-in-out infinite}
@keyframes dot-p{0%,100%{opacity:1}50%{opacity:0.25}}
#status-text{font-size:8px;letter-spacing:2px;color:rgba(255,140,0,0.35);text-transform:uppercase}
#track-title{font-size:11px;letter-spacing:0.5px;color:rgba(255,140,0,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity 0.35s}
#controls-row{display:flex;align-items:center;gap:10px}
#play-btn{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  border:1px solid rgba(255,140,0,0.35);background:rgba(255,140,0,0.08);color:var(--a);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.18s ease;
  -webkit-tap-highlight-color:transparent;
}
#play-btn:hover{background:rgba(255,140,0,0.18);border-color:var(--a);transform:scale(1.08)}
#play-btn:active{transform:scale(0.92)}
#vol-wrap{display:flex;align-items:center;gap:6px;flex:1}
.vol-lbl{font-size:8px;letter-spacing:1px;color:rgba(255,140,0,0.25);width:22px;text-align:right}
#vol-slider{flex:1;-webkit-appearance:none;height:1px;background:rgba(255,140,0,0.18);border-radius:1px;outline:none;cursor:pointer}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--a);cursor:pointer}
#vol-slider::-moz-range-thumb{width:10px;height:10px;border-radius:50%;border:none;background:var(--a);cursor:pointer}
#vol-val{font-size:8px;color:rgba(255,140,0,0.22);width:20px}

/* ── ТЕКСТ СНИЗУ СЛЕВА ── */
#footer-l{
  position:absolute;bottom:18px;left:26px;
  font-size:11px;letter-spacing:2px;
  color:rgba(255,140,0,0.22);
  text-transform:uppercase;
  pointer-events:none;
  font-style:italic;
}

/* ── QR СПРАВА СНИЗУ ── */
#qr-wrap{position:absolute;bottom:14px;right:26px;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
#qr-label{font-size:8px;letter-spacing:2px;color:rgba(255,140,0,0.18);text-transform:uppercase}

/* ── МОБИЛЬНЫЙ (плеер по центру экрана) ── */
@media(max-width:768px){
  #player-screen{
    left:10%;top:auto;
    bottom:80px;
    width:80%;
    height:auto;
    transform:none;
  }
  #cover-wrap{height:200px;flex:none}
  #clock-time{font-size:36px}
  #clock-date{font-size:18px}
  #station-name{font-size:20px}
  #station-freq{font-size:14px}
  #qr-wrap,#footer-l{display:none}
}

#yt-container{position:fixed;width:1px;height:1px;left:-9999px;top:-9999px;overflow:hidden;pointer-events:none}
</style>
</head>
<body>

<div id="bg-layer"><div id="bg-overlay"></div></div>

<div id="app">

  <div id="clock">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date">00.00.0000</div>
  </div>

  <div id="station-id">
    <div id="station-name">БУНКЕР 42</div>
    <div id="station-freq">105.3 FM</div>
  </div>

  <!-- ПЛЕЕР ПРЯМО НА ЭКРАНЕ МОНИТОРА -->
  <div id="player-screen">
    <div id="cover-wrap">
      <div id="cover-placeholder">BUNKER 42</div>
      <img id="cover-img" src="" alt="">
    </div>
    <div id="player-bar">
      <div id="track-info-row">
        <div class="s-dot off" id="s-dot"></div>
        <span id="status-text">ИНИЦИАЛИЗАЦИЯ</span>
      </div>
      <div id="track-title">—</div>
      <div id="controls-row">
        <button id="play-btn" aria-label="Play / Pause">
          <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div id="vol-wrap">
          <span class="vol-lbl">VOL</span>
          <input type="range" id="vol-slider" min="0" max="100" value="70" step="1">
          <span id="vol-val">70</span>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-l">Лучшая музыка для уцелевших</div>

  <div id="qr-wrap">
    <div id="qr-canvas"></div>
    <span id="qr-label">Telegram</span>
  </div>

</div>

<div id="yt-container"><div id="yt-iframe"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.js"></script>
<script>
const RADIO_EPOCH=1700000000;
let ytPlayer=null,allTracks=[],queue=[],queuePos=0,initialSeek=0;
let voiceIdx=0,trackCount=0,isMuted=true,hasStarted=false,currentVol=CONFIG.player.defaultVolume;
let voiceAudio=null,isVoice=false,bgIdx=0,bgSlides=[],ytAPIReady=false,tracksReady=false;

function updateClock(){
  const msk=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Moscow'}));
  const hh=String(msk.getHours()).padStart(2,'0'),mm=String(msk.getMinutes()).padStart(2,'0'),ss=String(msk.getSeconds()).padStart(2,'0');
  const dd=String(msk.getDate()).padStart(2,'0'),mo=String(msk.getMonth()+1).padStart(2,'0'),yr=msk.getFullYear()+71;
  document.getElementById('clock-time').textContent=`${hh}:${mm}:${ss}`;
  document.getElementById('clock-date').textContent=`${dd}.${mo}.${yr}`;
}
setInterval(updateClock,1000);updateClock();

document.getElementById('station-name').textContent=CONFIG.station.name;
document.getElementById('station-freq').textContent=CONFIG.station.frequency;
document.title=CONFIG.station.name;
document.getElementById('vol-slider').value=CONFIG.player.defaultVolume;
document.getElementById('vol-val').textContent=CONFIG.player.defaultVolume;
currentVol=CONFIG.player.defaultVolume;

function initQR(){
  try{
    new QRCode(document.getElementById('qr-canvas'),{
      text:'https://t.me/twoslicesofpizzza',
      width:60,height:60,
      colorDark:'rgba(255,140,0,0.4)',
      colorLight:'rgba(0,0,0,0)',
      correctLevel:QRCode.CorrectLevel.L
    });
  }catch(e){}
}

function initBackgrounds(){
  const layer=document.getElementById('bg-layer'),overlay=document.getElementById('bg-overlay');
  CONFIG.backgrounds.sources.forEach((src,i)=>{
    const el=document.createElement('div');
    el.className='bg-slide'+(i===0?' active':'');
    el.style.backgroundImage=`url(${src})`;
    layer.insertBefore(el,overlay);bgSlides.push(el);
  });
  if(bgSlides.length>1)setInterval(()=>{
    bgSlides[bgIdx].classList.remove('active');
    bgIdx=(bgIdx+1)%bgSlides.length;
    bgSlides[bgIdx].classList.add('active');
  },CONFIG.backgrounds.interval*1000);
}

function seededRand(seed){let s=seed>>>0;return()=>{s=Math.imul(1664525,s)+1013904223>>>0;return s/4294967296};}
function deterministicShuffle(arr){
  const a=[...arr],rnd=seededRand(42);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildQueue(){queue=CONFIG.player.shuffle?deterministicShuffle(allTracks.map((_,i)=>i)):allTracks.map((_,i)=>i);}

function parseDuration(iso){
  if(!iso)return 240;
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return 240;
  return(parseInt(m[1]||0)*3600)+(parseInt(m[2]||0)*60)+parseInt(m[3]||0);
}

async function fetchDurations(videoIds){
  const{apiKey}=CONFIG.youtube,d={};
  for(let i=0;i<videoIds.length;i+=50){
    const batch=videoIds.slice(i,i+50).join(',');
    try{
      const res=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${batch}&key=${apiKey}`);
      const data=await res.json();
      (data.items||[]).forEach(item=>{d[item.id]=parseDuration(item.contentDetails?.duration);});
    }catch(e){}
  }
  return d;
}

function getCurrentPosition(){
  const now=Math.floor(Date.now()/1000),elapsed=now-RADIO_EPOCH;
  const totalDur=allTracks.reduce((s,t)=>s+t.duration,0);
  if(!totalDur)return{trackIdx:0,seekTo:0};
  const pos=elapsed%totalDur;
  let acc=0;
  for(let i=0;i<queue.length;i++){
    const dur=allTracks[queue[i]].duration;
    if(pos<acc+dur)return{trackIdx:i,seekTo:pos-acc};
    acc+=dur;
  }
  return{trackIdx:0,seekTo:0};
}

async function fetchPlaylist(pageToken){
  const{apiKey,playlistId}=CONFIG.youtube;
  if(!apiKey||apiKey.includes('ВСТАВЬ')){setStatus('УКАЖИ API КЛЮЧ');return[];}
  if(!playlistId||playlistId.includes('ВСТАВЬ')){setStatus('УКАЖИ ID ПЛЕЙЛИСТА');return[];}
  let url=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${apiKey}`;
  if(pageToken)url+=`&pageToken=${pageToken}`;
  let data;
  try{const res=await fetch(url);data=await res.json();}catch(e){setStatus('ОШИБКА СЕТИ');return[];}
  if(data.error){setStatus(data.error.message.slice(0,40).toUpperCase());return[];}
  const items=(data.items||[]).filter(it=>it.snippet.title!=='Private video'&&it.snippet.title!=='Deleted video')
    .map(it=>({
      id:it.snippet.resourceId.videoId,title:it.snippet.title,
      thumb:it.snippet.thumbnails?.maxres?.url||it.snippet.thumbnails?.high?.url
        ||`https://img.youtube.com/vi/${it.snippet.resourceId.videoId}/maxresdefault.jpg`,
      duration:240,
    }));
  if(data.nextPageToken){const more=await fetchPlaylist(data.nextPageToken);return[...items,...more];}
  return items;
}

function loadTrackUI(track){
  const te=document.getElementById('track-title');
  te.style.opacity=0;
  setTimeout(()=>{
    te.textContent=track.title;
    te.style.transition='opacity 0.5s';
    te.style.opacity=1;
  },350);
  const img=document.getElementById('cover-img');
  img.classList.remove('loaded');
  img.onload=()=>img.classList.add('loaded');
  img.onerror=()=>{img.src=`https://img.youtube.com/vi/${track.id}/hqdefault.jpg`;};
  img.src=track.thumb;
}
function setStatus(text){document.getElementById('status-text').textContent=text;}

function playTrack(idx,seek){
  if(!ytPlayer||!allTracks.length)return;
  const track=allTracks[queue[idx]];
  loadTrackUI(track);
  if(seek&&seek>1)ytPlayer.loadVideoById({videoId:track.id,startSeconds:Math.floor(seek)});
  else ytPlayer.loadVideoById(track.id);
}

function advanceTrack(){
  if(!isVoice&&CONFIG.voices.enabled&&CONFIG.voices.files.length){
    trackCount++;
    if(trackCount>=CONFIG.voices.interval){trackCount=0;playVoiceMessage();return;}
  }
  queuePos++;
  if(queuePos>=queue.length){buildQueue();queuePos=0;}
  playTrack(queuePos,0);
}

function playVoiceMessage(){
  const files=CONFIG.voices.files;
  if(!files.length){advanceTrack();return;}
  const file=files[voiceIdx%files.length];voiceIdx++;
  isVoice=true;setStatus('СООБЩЕНИЕ ВЕДУЩЕГО');
  if(ytPlayer)ytPlayer.pauseVideo();
  voiceAudio=new Audio(`media/voices/${file}`);
  voiceAudio.volume=isMuted?0:currentVol/100;
  voiceAudio.play().catch(finishVoice);
  voiceAudio.onended=finishVoice;
}
function finishVoice(){
  isVoice=false;voiceAudio=null;setStatus('В ЭФИРЕ');
  queuePos++;if(queuePos>=queue.length){buildQueue();queuePos=0;}
  playTrack(queuePos,0);
}

function applyVolume(){
  const vol=isMuted?0:currentVol;
  if(ytPlayer&&typeof ytPlayer.setVolume==='function')ytPlayer.setVolume(isVoice?0:vol);
  if(voiceAudio)voiceAudio.volume=vol/100;
}
function setPlayIcon(showPlay){
  document.getElementById('icon-play').style.display=showPlay?'block':'none';
  document.getElementById('icon-pause').style.display=showPlay?'none':'block';
}

function togglePlay(){
  if(!hasStarted){
    hasStarted=true;isMuted=false;
    if(allTracks.length){
      const{trackIdx,seekTo}=getCurrentPosition();
      const state=ytPlayer?ytPlayer.getPlayerState():-1;
      if(state!==1&&state!==3){
        queuePos=trackIdx;
        loadTrackUI(allTracks[queue[queuePos]]);
        if(ytPlayer)ytPlayer.loadVideoById({videoId:allTracks[queue[queuePos]].id,startSeconds:Math.floor(seekTo)});
      }
    }
    applyVolume();
    if(ytPlayer)ytPlayer.playVideo();
    setPlayIcon(false);
    document.getElementById('s-dot').className='s-dot on';
    setStatus('В ЭФИРЕ');
    return;
  }
  isMuted=!isMuted;applyVolume();setPlayIcon(isMuted);
}

function loadYouTubeAPI(){
  const s=document.createElement('script');
  s.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}
window.onYouTubeIframeAPIReady=function(){ytAPIReady=true;tryInitPlayer();};
function tryInitPlayer(){
  if(!ytAPIReady||!tracksReady)return;
  const track=allTracks[queue[queuePos]];
  ytPlayer=new YT.Player('yt-iframe',{
    height:'1',width:'1',videoId:track.id,
    playerVars:{autoplay:0,controls:0,disablekb:1,fs:0,iv_load_policy:3,
      modestbranding:1,rel:0,start:Math.floor(initialSeek),origin:window.location.origin||'*'},
    events:{onReady:onYTReady,onStateChange:onYTState}
  });
}
function onYTReady(){
  ytPlayer.setVolume(0);
  if(initialSeek>1)ytPlayer.seekTo(Math.floor(initialSeek),true);
  ytPlayer.playVideo();
  setStatus('НАЖМИ PLAY');
}
function onYTState(e){
  if(e.data===YT.PlayerState.ENDED&&!isVoice)advanceTrack();
  if(e.data===YT.PlayerState.PLAYING&&!isMuted&&hasStarted&&!isVoice)ytPlayer.setVolume(currentVol);
}

document.getElementById('play-btn').addEventListener('click',togglePlay);
document.getElementById('vol-slider').addEventListener('input',function(){
  currentVol=parseInt(this.value);
  document.getElementById('vol-val').textContent=currentVol;
  if(!isMuted)applyVolume();
});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target===document.body){e.preventDefault();togglePlay();}
});

async function boot(){
  initBackgrounds();
  initQR();
  loadYouTubeAPI();
  setStatus('ЗАГРУЗКА...');
  const items=await fetchPlaylist();
  if(!items.length)return;
  setStatus('СИНХРОНИЗАЦИЯ...');
  const durations=await fetchDurations(items.map(t=>t.id));
  allTracks=items.map(t=>({...t,duration:durations[t.id]||240}));
  buildQueue();
  const{trackIdx,seekTo}=getCurrentPosition();
  queuePos=trackIdx;initialSeek=seekTo;
  if(CONFIG.voices.files.length){
    trackCount=queuePos%Math.max(1,CONFIG.voices.interval);
    voiceIdx=Math.floor(queuePos/Math.max(1,CONFIG.voices.interval))%Math.max(1,CONFIG.voices.files.length);
  }
  loadTrackUI(allTracks[queue[queuePos]]);
  tracksReady=true;tryInitPlayer();
}
boot();
</script>
</body>
</html>
